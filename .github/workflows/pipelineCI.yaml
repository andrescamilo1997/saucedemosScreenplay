name: Pipeline CI

on:
  push:
    branches:
      - main

jobs:
  qa_automation:
    runs-on: ubuntu-latest

    steps:
      - name: Extraer proyecto desde Git
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Dar permisos a Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Ejecutar pruebas
        run: ./gradlew clean build test aggregate

      - name: Publicar resultados de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/test-results/**
            **/build/reports/**