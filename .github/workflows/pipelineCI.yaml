name: Pipeline CI

on:
  push:
    branches:
      - main

jobs:
  qa_automation_screenplay:
    runs-on: ubuntu-latest
    steps:
      - name: Extraer proyecto desde Git
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Dar permisos a Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Ejecutar pruebas Screenplay
        run: ./gradlew clean build test aggregate

      - name: Publicar resultados de pruebas Gradle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-results
          path: |
            **/build/test-results/**
            **/build/reports/**

      - name: Comprimir reporte Serenity
        if: always()
        run: |
          cd target/site
          zip -r serenity-report.zip serenity

      - name: Publicar reporte Serenity comprimido
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: target/site/serenity-report.zip
          retention-days: 30

  qa_automation_playwright:
    runs-on: ubuntu-latest
    needs: qa_automation_screenplay 
    
    steps:
      - name: Extraer proyecto desde Git
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 🚀 CORRECCIÓN 1: Cambiamos de '20' a '24' para cumplir con Cucumber

      - name: Instalar dependencias de Node
        run: |
          cd playwrite
          npm ci

      - name: Instalar navegadores de Playwright
        run: |
          cd playwrite
          npx playwright install --with-deps chromium

      - name: Ejecutar pruebas Playwright en Headless
        run: |
          cd playwrite
          # 💡 Eliminamos el "|| node generate-report.js" de aquí del YAML. 
          # Dejamos que Cucumber corra limpio y maneje sus salidas.
          npm test

      # 🚀 CORRECCIÓN 2: Si el archivo generate-report.js está un nivel atrás (en la raíz general),
      # le decimos a Node exactamente dónde ir a buscarlo sin importar si el test falló o pasó.
      - name: Generar Reporte HTML Visual
        if: always()
        run: |
          # Si confirmas que 'generate-report.js' está en la raíz general, se ejecuta así:
          node generate-report.js
          
          # NOTA: Si al moverlo lo dejaste DENTRO de la carpeta playwrite, 
          # cambia la línea de arriba por: node playwrite/generate-report.js

      - name: Comprimir reporte de Cucumber HTML
        if: always()
        run: |
          cd playwrite
          zip -r cucumber-report.zip reports/

      - name: Publicar reporte Cucumber comprimido
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-playwright-report
          path: playwrite/cucumber-report.zip
          retention-days: 30