name: Pipeline CI

on:
  push:
    branches:
      - main

jobs:
  qa_automation_screenplay:
    runs-on: ubuntu-latest
    steps:
      - name: Extraer proyecto desde Git
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Dar permisos a Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Ejecutar pruebas Screenplay
        run: ./gradlew clean build test aggregate

      - name: Publicar resultados de pruebas Gradle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-results
          path: |
            **/build/test-results/**
            **/build/reports/**

      - name: Comprimir reporte Serenity
        if: always()
        run: |
          cd target/site
          zip -r serenity-report.zip serenity

      - name: Publicar reporte Serenity comprimido
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: target/site/serenity-report.zip
          retention-days: 30

  # 🎭 JOB 2: Automatización con Playwright, Cucumber y JavaScript
  qa_automation_playwright:
    runs-on: ubuntu-latest
    needs: qa_automation_screenplay 
    
    steps:
      - name: Extraer proyecto desde Git
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependencias de Node
        run: |
          cd playwrite
          npm ci

      - name: Instalar navegadores de Playwright
        run: |
          cd playwrite
          npx playwright install --with-deps chromium

      - name: Ejecutar pruebas Playwright en Headless
        run: |
          cd playwrite
          # Al correr esto, Cucumber creará el .json y el .html automáticamente
          npm test

      - name: Comprimir reporte de Cucumber HTML
        if: always()
        run: |
          cd playwrite
          # Comprimimos la carpeta de reportes completa (donde está el .html y las fotos)
          zip -r cucumber-report.zip reports/

      - name: Publicar reporte Cucumber comprimido
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-playwright-report
          path: playwrite/cucumber-report.zip
          retention-days: 30