trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: QA_Automation
    displayName: 'Etapa de Pruebas Automatizadas'
    jobs:
      - job: Run_Serenity_Tests
        displayName: 'Ejecución de Pruebas con Gradle'
        steps:
          - checkout: self
            displayName: 'Paso 1: Extraer proyecto desde Git'
          - task: JavaToolInstaller@0
            displayName: 'Configurar entorno Java (JDK 17)'
            inputs:
              versionSpec: '17'
              jdkSourceOption: 'PreInstalled'
              jdkArchitectureOption: 'x64'
          - script: |
              echo "Otorgando permisos de ejecución al wrapper de Gradle..."
              chmod +x ./gradlew
              echo "Iniciando la compilación y ejecución de pruebas..."
              ./gradlew clean build test aggregate
            displayName: 'Paso 2: Ejecutar ./gradlew clean build test aggregate'
          - task: PublishTestResults@2
            displayName: 'Paso 3: Publicar Reportes XML en Azure'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results/**/*.xml'